# ─────────────────────────────────────────────────────────────────────────────
# RavenOSINT — default configuration
# Override any value with an environment variable:
#   RAVEN__<SECTION>__<KEY>=value
# ─────────────────────────────────────────────────────────────────────────────

[database]
# Options:
#   sqlite://raven.db                  — lightweight default
#   postgres://user:pass@localhost/raven — persistent server
#   duckdb://raven.duckdb              — analytical queries (fast aggregations)
url = "sqlite://raven.db"

[scraper]
rate_rpm         = 10
timeout_secs     = 30
max_redirects    = 10
user_agents = [
    "Mozilla/5.0 (compatible; RavenOSINT/0.1; +https://github.com/yourorg/raven-osint)",
    "Mozilla/5.0 (X11; Linux x86_64; rv:124.0) Gecko/20100101 Firefox/124.0",
]
proxies = []

[discovery]
enabled             = true
default_provider    = "serper"
default_limit       = 25
max_limit           = 100
timeout_secs        = 20
rate_rpm            = 30
include_subdomains  = true
validate_by_default = false

[discovery.serper]
enabled  = true
base_url = "https://google.serper.dev/search"
api_key  = ""   # RAVEN__DISCOVERY__SERPER__API_KEY

[discovery.exa]
enabled  = true
base_url = "https://api.exa.ai/search"
api_key  = ""   # RAVEN__DISCOVERY__EXA__API_KEY

[discovery.censys]
enabled    = true
base_url   = "https://api.platform.censys.io/v3"
api_key    = ""   # RAVEN__DISCOVERY__CENSYS__API_KEY    (Platform PAT)
api_secret = ""   # RAVEN__DISCOVERY__CENSYS__API_SECRET (optional legacy v2 secret)
# Optional org context for Platform API billing/permissions:
# RAVEN__DISCOVERY__CENSYS__ORGANIZATION_ID=<uuid>

[discovery.virus_total]
enabled  = true
base_url = "https://www.virustotal.com/api/v3"
api_key  = ""   # RAVEN__DISCOVERY__VIRUS_TOTAL__API_KEY

[llm]
provider    = "deepseek"
base_url    = "https://api.deepseek.com/v1"
model       = "deepseek-chat"
api_key     = ""    # RAVEN__LLM__API_KEY
max_tokens  = 1024
temperature = 0.2

# Supported providers:
# - deepseek        (OpenAI-compatible)
# - openai          (OpenAI API)
# - kimi            (Moonshot)
# - github_copilot  (GitHub Models / Copilot)
# - gemini          (Google Gemini native API)
# - claude          (Anthropic native API)
#
# Provider-specific examples:
# openai:         provider="openai"         base_url="https://api.openai.com/v1"                 model="gpt-4o-mini"
# kimi:           provider="kimi"           base_url="https://api.moonshot.cn/v1"                 model="moonshot-v1-8k"
# github_copilot: provider="github_copilot" base_url="https://models.inference.ai.azure.com"     model="gpt-4o-mini"
# gemini:         provider="gemini"         base_url="https://generativelanguage.googleapis.com/v1beta" model="gemini-1.5-flash"
# claude:         provider="claude"         base_url="https://api.anthropic.com/v1"              model="claude-3-5-sonnet-latest"

[api]
host = "127.0.0.1"
port = 3000

[logging]
level  = "info"
format = "pretty"
